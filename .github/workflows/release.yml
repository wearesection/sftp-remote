name: Create Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+' # Match semantic versions: 1.0.0, 2.1.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases and pushing commits

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for changelog generation

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update package.json version to match tag
        run: |
          VERSION=${{ github.ref_name }}
          npm version $VERSION --no-git-tag-version

      - name: Build distribution
        run: npm run build

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit package.json and rebuilt dist if changed
        if: steps.check_changes.outputs.changed == 'true'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json dist/
          git commit -m "chore: bump version to ${TAG_NAME} and rebuild dist"
          git push origin HEAD:refs/heads/release/${TAG_NAME}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
